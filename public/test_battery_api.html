<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Battery/Charger API</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h2>Test Battery/Charger API</h2>
    
    <div style="margin-bottom: 20px;">
        <button onclick="loadBatteries()">Load Available Batteries</button>
        <button onclick="loadChargers()">Load Available Chargers</button>
    </div>
    
    <div style="margin-bottom: 20px;">
        <label>Test Unit Components (Unit ID):</label>
        <input type="number" id="unitId" placeholder="Unit ID" value="1" style="padding: 5px;">
        <button onclick="loadUnitComponents()">Load Unit Components</button>
    </div>
    
    <div id="results" style="border: 1px solid #ccc; padding: 10px; max-height: 600px; overflow-y: auto;"></div>

    <script>
        function loadBatteries() {
            showLoading();
            fetch('/optima1/public/warehouse/inventory/available-batteries')
                .then(response => response.json())
                .then(data => {
                    showResults('Available Batteries', data);
                })
                .catch(error => {
                    showError('Error loading batteries: ' + error.message);
                });
        }
        
        function loadChargers() {
            showLoading();
            fetch('/optima1/public/warehouse/inventory/available-chargers')
                .then(response => response.json())
                .then(data => {
                    showResults('Available Chargers', data);
                })
                .catch(error => {
                    showError('Error loading chargers: ' + error.message);
                });
        }
        
        function loadUnitComponents() {
            const unitId = document.getElementById('unitId').value;
            if (!unitId) {
                showError('Please enter a Unit ID');
                return;
            }
            
            showLoading();
            fetch(`/optima1/public/warehouse/inventory/unit-components?unit_id=${unitId}`)
                .then(response => response.json())
                .then(data => {
                    showResults(`Unit ${unitId} Components`, data);
                })
                .catch(error => {
                    showError('Error loading unit components: ' + error.message);
                });
        }
        
        function showLoading() {
            document.getElementById('results').innerHTML = '<p>Loading...</p>';
        }
        
        function showError(message) {
            document.getElementById('results').innerHTML = `<p style="color: red;">${message}</p>`;
        }
        
        function showResults(title, data) {
            const resultsDiv = document.getElementById('results');
            let html = `<h3>${title}</h3>`;
            
            if (data && data.success) {
                if (data.data && data.data.length > 0) {
                    html += `<p><strong>Found ${data.data.length} items:</strong></p><ul>`;
                    
                    data.data.forEach(item => {
                        html += `
                            <li style="margin-bottom: 8px; padding: 5px; border-bottom: 1px solid #eee;">
                                <strong>ID:</strong> ${item.id_inventory_attachment || item.id || 'N/A'} |
                                <strong>Serial:</strong> ${item.serial_number || 'N/A'} |
                                <strong>Merk:</strong> ${item.merk_attachment || item.merk || 'N/A'} |
                                <strong>Model:</strong> ${item.model_attachment || item.model || 'N/A'} |
                                <strong>Status:</strong> ${item.status_attachment_id || item.status || 'N/A'} |
                                <strong>Unit ID:</strong> ${item.unit_id || 'N/A'}
                                ${item.tipe_item ? `| <strong>Type:</strong> ${item.tipe_item}` : ''}
                            </li>
                        `;
                    });
                    html += '</ul>';
                } else {
                    html += '<p>No items found.</p>';
                }
                
                if (data.message) {
                    html += `<p><em>Message:</em> ${data.message}</p>`;
                }
            } else {
                html += `<p style="color: red;">Error: ${data.message || 'Unknown error'}</p>`;
            }
            
            html += `<pre style="background: #f5f5f5; padding: 10px; margin-top: 10px; font-size: 12px;">${JSON.stringify(data, null, 2)}</pre>`;
            
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
