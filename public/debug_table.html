<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug SPK Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Debug SPK Data Table</h2>
    
    <div class="row mb-3">
        <div class="col-md-3">
            <button class="btn btn-primary w-100" onclick="testMockData()">Test Mock Data</button>
        </div>
        <div class="col-md-3">
            <button class="btn btn-success w-100" onclick="testTableRender()">Test Table Render</button>
        </div>
        <div class="col-md-3">
            <button class="btn btn-info w-100" onclick="checkDOMElements()">Check DOM</button>
        </div>
        <div class="col-md-3">
            <button class="btn btn-warning w-100" onclick="forceMockRender()">Force Render</button>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped" id="spkTable">
                    <thead class="table-dark">
                        <tr>
                            <th>No SPK</th>
                            <th>Jenis</th>
                            <th>Project/Kontrak</th>
                            <th>Customer</th>
                            <th>PIC</th>
                            <th>Kontak</th>
                            <th>Status</th>
                            <th>Total Unit</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div id="spkTableInfo">Showing 0 to 0 of 0 entries</div>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="spkPagination"></ul>
                </nav>
            </div>
        </div>
    </div>
    
    <div class="card mt-3">
        <div class="card-header">Debug Output</div>
        <div class="card-body">
            <pre id="debugOutput" style="height: 300px; overflow-y: auto; background: #f8f9fa; padding: 15px;"></pre>
        </div>
    </div>
</div>

<script>
window.SPK_CONFIG = {
  baseUrl: '/',
  csrfToken: 'test_token',
  userId: '1',
  userName: 'Test User'
};

function log(message) {
    const output = document.getElementById('debugOutput');
    const timestamp = new Date().toLocaleTimeString();
    output.textContent += `[${timestamp}] ${message}\n`;
    output.scrollTop = output.scrollHeight;
    console.log(message);
}

function testMockData() {
    log('=== Testing Mock Data ===');
    const mockData = [
        {
            id: 'SPK001',
            no_spk: 'SPK/2024/001',
            jenis_spk: 'Service',
            project: 'Project Alpha',
            customer: 'PT ABC',
            pic: 'John Doe',
            kontak: '08123456789',
            status: 'READY',
            total_unit: 5
        },
        {
            id: 'SPK002',
            no_spk: 'SPK/2024/002',
            jenis_spk: 'Maintenance',
            project: 'Project Beta',
            customer: 'PT XYZ',
            pic: 'Jane Smith',
            kontak: '08198765432',
            status: 'IN_PROGRESS',
            total_unit: 3
        }
    ];
    
    log(`Mock data created: ${mockData.length} items`);
    log(JSON.stringify(mockData, null, 2));
    return mockData;
}

function testTableRender() {
    log('=== Testing Table Render ===');
    const tbody = document.querySelector('#spkTable tbody');
    if (!tbody) {
        log('ERROR: Table body not found!');
        return;
    }
    
    const mockData = testMockData();
    const rows = mockData.map(spk => `
        <tr>
            <td>${spk.no_spk}</td>
            <td>${spk.jenis_spk}</td>
            <td>${spk.project}</td>
            <td>${spk.customer}</td>
            <td>${spk.pic}</td>
            <td>${spk.kontak}</td>
            <td><span class="badge bg-success">${spk.status}</span></td>
            <td><span class="badge bg-info">${spk.total_unit}</span></td>
            <td>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-primary" onclick="log('Detail clicked for ${spk.id}')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
    
    tbody.innerHTML = rows;
    log(`Table rendered with ${tbody.children.length} rows`);
    
    // Update info
    const info = document.getElementById('spkTableInfo');
    if (info) {
        info.textContent = `Showing 1 to ${mockData.length} of ${mockData.length} entries`;
        log('Info updated');
    }
}

function checkDOMElements() {
    log('=== Checking DOM Elements ===');
    
    const table = document.getElementById('spkTable');
    log(`Table found: ${!!table}`);
    
    const tbody = document.querySelector('#spkTable tbody');
    log(`Table body found: ${!!tbody}`);
    log(`Table body rows: ${tbody ? tbody.children.length : 'N/A'}`);
    
    const info = document.getElementById('spkTableInfo');
    log(`Info element found: ${!!info}`);
    
    const pagination = document.getElementById('spkPagination');
    log(`Pagination found: ${!!pagination}`);
}

function forceMockRender() {
    log('=== Force Mock Render ===');
    const tbody = document.querySelector('#spkTable tbody');
    if (!tbody) {
        log('ERROR: No table body found');
        return;
    }
    
    tbody.innerHTML = `
        <tr>
            <td>SPK/TEST/001</td>
            <td>Test Service</td>
            <td>Test Project</td>
            <td>Test Customer</td>
            <td>Test PIC</td>
            <td>081234567890</td>
            <td><span class="badge bg-success">READY</span></td>
            <td><span class="badge bg-info">1</span></td>
            <td>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-primary">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </td>
        </tr>
    `;
    
    log('Force rendered 1 test row');
    
    const info = document.getElementById('spkTableInfo');
    if (info) {
        info.textContent = 'Showing 1 to 1 of 1 entries (FORCED)';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    log('Debug page loaded');
    checkDOMElements();
});
</script>

</body>
</html>
