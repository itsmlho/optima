<!DOCTYPE html>
<html>
<head>
    <title>Test Dropdown Endpoints</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        button { padding: 8px 15px; margin: 5px; }
        pre { background: #f8f8f8; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test Work Order Dropdown Endpoints</h1>
    
    <div class="test-section">
        <h3>1. Test Units Dropdown</h3>
        <button onclick="testUnitsDropdown()">Test Units Dropdown</button>
        <div id="unitsResult" class="result" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h3>2. Test Staff Dropdown</h3>
        <select id="staffRoleSelect">
            <option value="ADMIN">Admin</option>
            <option value="FOREMAN">Foreman</option>
            <option value="MECHANIC">Mechanic</option>
            <option value="HELPER">Helper</option>
        </select>
        <button onclick="testStaffDropdown()">Test Staff Dropdown</button>
        <div id="staffResult" class="result" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h3>3. Test Subcategories</h3>
        <input type="number" id="categoryId" placeholder="Category ID (1-5)" value="1" min="1">
        <button onclick="testSubcategories()">Test Subcategories</button>
        <div id="subcategoriesResult" class="result" style="display:none;"></div>
    </div>

    <script>
        async function testUnitsDropdown() {
            try {
                const response = await fetch('/optima1/public/work-orders/units-dropdown');
                const result = await response.json();
                
                document.getElementById('unitsResult').style.display = 'block';
                document.getElementById('unitsResult').innerHTML = 
                    '<strong>Status:</strong> ' + response.status + '<br>' +
                    '<strong>Success:</strong> ' + result.success + '<br>' +
                    '<strong>Data Count:</strong> ' + (result.data ? result.data.length : 0) + '<br>' +
                    '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('unitsResult').style.display = 'block';
                document.getElementById('unitsResult').innerHTML = 
                    '<strong>Error:</strong> ' + error.message;
            }
        }
        
        async function testStaffDropdown() {
            try {
                const staffRole = document.getElementById('staffRoleSelect').value;
                const response = await fetch('/optima1/public/work-orders/staff-dropdown', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({ staff_role: staffRole })
                });
                const result = await response.json();
                
                document.getElementById('staffResult').style.display = 'block';
                document.getElementById('staffResult').innerHTML = 
                    '<strong>Status:</strong> ' + response.status + '<br>' +
                    '<strong>Success:</strong> ' + result.success + '<br>' +
                    '<strong>Role:</strong> ' + staffRole + '<br>' +
                    '<strong>Data Count:</strong> ' + (result.data ? result.data.length : 0) + '<br>' +
                    '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('staffResult').style.display = 'block';
                document.getElementById('staffResult').innerHTML = 
                    '<strong>Error:</strong> ' + error.message;
            }
        }
        
        async function testSubcategories() {
            try {
                const categoryId = document.getElementById('categoryId').value;
                const response = await fetch('/optima1/public/work-orders/get-subcategories', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({ category_id: categoryId })
                });
                const result = await response.json();
                
                document.getElementById('subcategoriesResult').style.display = 'block';
                document.getElementById('subcategoriesResult').innerHTML = 
                    '<strong>Status:</strong> ' + response.status + '<br>' +
                    '<strong>Success:</strong> ' + (result.success || result.status) + '<br>' +
                    '<strong>Category ID:</strong> ' + categoryId + '<br>' +
                    '<strong>Data Count:</strong> ' + (result.data ? result.data.length : 0) + '<br>' +
                    '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('subcategoriesResult').style.display = 'block';
                document.getElementById('subcategoriesResult').innerHTML = 
                    '<strong>Error:</strong> ' + error.message;
            }
        }
    </script>
</body>
</html>
