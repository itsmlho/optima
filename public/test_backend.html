<!DOCTYPE html>
<html>
<head>
    <title>Work Order Backend Test</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .test-section { margin-bottom: 30px; border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
        .test-section h3 { margin-top: 0; color: #333; }
        .btn { padding: 8px 15px; margin: 5px; border: none; border-radius: 3px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: black; }
        .result { margin-top: 10px; padding: 10px; border-radius: 3px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        input, select { padding: 5px; margin: 5px; border: 1px solid #ccc; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Work Order Backend Test</h1>
        <p>Test semua endpoint backend untuk Work Order system</p>
        
        <div class="test-section">
            <h3>1. Generate Work Order Number</h3>
            <button class="btn btn-primary" onclick="testGenerateNumber()">Test Generate Number</button>
            <div id="result1" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h3>2. Search Units</h3>
            <input type="text" id="unitSearch" placeholder="Cari unit (contoh: TR)" value="TR">
            <button class="btn btn-primary" onclick="testSearchUnits()">Test Search Units</button>
            <div id="result2" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h3>3. Search Staff</h3>
            <input type="text" id="staffSearch" placeholder="Cari staff (contoh: mech)" value="mech">
            <select id="staffRole">
                <option value="admin">Admin</option>
                <option value="foreman">Foreman</option>
                <option value="mechanic" selected>Mechanic</option>
                <option value="helper">Helper</option>
            </select>
            <button class="btn btn-primary" onclick="testSearchStaff()">Test Search Staff</button>
            <div id="result3" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h3>4. Get Priority</h3>
            <input type="number" id="priorityId" placeholder="Priority ID" value="1" min="1">
            <button class="btn btn-primary" onclick="testGetPriority()">Test Get Priority</button>
            <div id="result4" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h3>5. Get Subcategory Priority</h3>
            <input type="number" id="subcategoryId" placeholder="Subcategory ID" value="1" min="1">
            <button class="btn btn-primary" onclick="testGetSubcategoryPriority()">Test Get Subcategory Priority</button>
            <div id="result5" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h3>6. Test Work Order Creation</h3>
            <p>Simulasi membuat Work Order baru dengan data minimal:</p>
            <button class="btn btn-success" onclick="testCreateWorkOrder()">Test Create Work Order</button>
            <div id="result6" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h3>7. Test All Endpoints</h3>
            <button class="btn btn-warning" onclick="testAllEndpoints()">Test All Endpoints</button>
            <div id="resultAll" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        const baseUrl = '/optima1/public/work-orders/';
        
        function showResult(elementId, success, message, data = null) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'result ' + (success ? 'success' : 'error');
            
            let html = '<strong>' + (success ? 'SUCCESS' : 'ERROR') + ':</strong> ' + message;
            if (data) {
                html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            }
            element.innerHTML = html;
        }
        
        function makeRequest(url, data = {}) {
            return fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: new URLSearchParams(data)
            });
        }
        
        async function testGenerateNumber() {
            try {
                const response = await makeRequest(baseUrl + 'generate-number');
                const result = await response.json();
                showResult('result1', result.success, 'Generate number test', result);
            } catch (error) {
                showResult('result1', false, 'Network error: ' + error.message);
            }
        }
        
        async function testSearchUnits() {
            try {
                const searchTerm = document.getElementById('unitSearch').value;
                const response = await makeRequest(baseUrl + 'search-units', {search: searchTerm});
                const result = await response.json();
                showResult('result2', result.success, 'Search units test', result);
            } catch (error) {
                showResult('result2', false, 'Network error: ' + error.message);
            }
        }
        
        async function testSearchStaff() {
            try {
                const searchTerm = document.getElementById('staffSearch').value;
                const role = document.getElementById('staffRole').value;
                const response = await makeRequest(baseUrl + 'search-staff', {search: searchTerm, role: role});
                const result = await response.json();
                showResult('result3', result.success, 'Search staff test', result);
            } catch (error) {
                showResult('result3', false, 'Network error: ' + error.message);
            }
        }
        
        async function testGetPriority() {
            try {
                const priorityId = document.getElementById('priorityId').value;
                const response = await makeRequest(baseUrl + 'get-priority', {priority_id: priorityId});
                const result = await response.json();
                showResult('result4', result.success, 'Get priority test', result);
            } catch (error) {
                showResult('result4', false, 'Network error: ' + error.message);
            }
        }
        
        async function testGetSubcategoryPriority() {
            try {
                const subcategoryId = document.getElementById('subcategoryId').value;
                const response = await makeRequest(baseUrl + 'get-subcategory-priority', {subcategory_id: subcategoryId});
                const result = await response.json();
                showResult('result5', result.success, 'Get subcategory priority test', result);
            } catch (error) {
                showResult('result5', false, 'Network error: ' + error.message);
            }
        }
        
        async function testCreateWorkOrder() {
            try {
                // First get a unit and other required data
                const testData = {
                    unit_id: 1,
                    order_type: 'PM',
                    priority_id: 1,
                    category_id: 1,
                    complaint_description: 'Test work order creation from backend test'
                };
                
                const response = await makeRequest('/optima1/public/work-orders', testData);
                const result = await response.json();
                showResult('result6', result.status, 'Create work order test', result);
            } catch (error) {
                showResult('result6', false, 'Network error: ' + error.message);
            }
        }
        
        async function testAllEndpoints() {
            const resultDiv = document.getElementById('resultAll');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.innerHTML = '<strong>TESTING ALL ENDPOINTS...</strong><br>';
            
            const tests = [
                {name: 'Generate Number', url: 'generate-number', data: {}},
                {name: 'Search Units', url: 'search-units', data: {search: 'TR'}},
                {name: 'Search Staff', url: 'search-staff', data: {search: 'mech', role: 'mechanic'}},
                {name: 'Get Priority', url: 'get-priority', data: {priority_id: 1}},
                {name: 'Get Subcategory Priority', url: 'get-subcategory-priority', data: {subcategory_id: 1}}
            ];
            
            let results = [];
            
            for (let test of tests) {
                try {
                    const response = await makeRequest(baseUrl + test.url, test.data);
                    const result = await response.json();
                    results.push({
                        test: test.name,
                        success: result.success || result.status,
                        message: result.message || 'OK',
                        status: response.status
                    });
                } catch (error) {
                    results.push({
                        test: test.name,
                        success: false,
                        message: error.message,
                        status: 'Error'
                    });
                }
                
                resultDiv.innerHTML += test.name + ': ' + (results[results.length-1].success ? '✓' : '✗') + '<br>';
            }
            
            resultDiv.innerHTML += '<pre>' + JSON.stringify(results, null, 2) + '</pre>';
        }
    </script>
</body>
</html>
